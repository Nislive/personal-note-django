{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Notes - Auth</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
    <div class="background-effects">
        <div class="glow-orb glow-orb-1"></div>
        <div class="glow-orb glow-orb-2"></div>
    </div>

    <div class="login-container">
        <div class="login-card" id="authCard">
            
            <div id="loginView" class="auth-view">
                <div class="login-header">
                    <div class="logo-icon">⚡</div>
                    <h2>Sign In</h2>
                    <p>Access your workspace</p>
                </div>
                <form id="loginForm" novalidate>
                    {% csrf_token %}
                    <div class="form-group">
                        <div class="input-wrapper">
                            <input type="text" id="username" name="username" required>
                            <label for="username">Username</label>
                            <span class="input-line"></span>
                        </div>
                        <span class="error-message" id="usernameError"></span>
                    </div>
                    <div class="form-group">
                        <div class="input-wrapper">
                            <input type="password" id="password" name="password" required>
                            <label for="password">Password</label>
                            <button type="button" class="password-toggle" data-target="password">
                                <span class="toggle-icon"></span>
                            </button>
                            <span class="input-line"></span>
                        </div>
                        <span class="error-message" id="passwordError"></span>
                    </div>
                    <button type="submit" class="login-btn">
                        <span class="btn-text">Sign In</span>
                        <span class="btn-loader"></span>
                        <span class="btn-glow"></span>
                    </button>
                </form>
                <div class="signup-link">
                    <p>New here? <a href="javascript:void(0)" id="showRegisterBtn">Create account</a></p>
                </div>
            </div>

            <div id="registerView" class="auth-view" style="display: none; opacity: 0;">
                <div class="login-header">
                    <div class="logo-icon" style="filter: hue-rotate(90deg);">✨</div>
                    <h2>Sign Up</h2>
                    <p>Join the neon side</p>
                </div>
                <form id="registerForm" novalidate>
                    {% csrf_token %}
                    <div class="form-group">
                        <div class="input-wrapper">
                            <input type="text" id="reg_username" name="username" required>
                            <label for="reg_username">Username</label>
                            <span class="input-line"></span>
                        </div>
                        <span class="error-message" id="reg_usernameError"></span>
                    </div>
                    <div class="form-group">
                        <div class="input-wrapper">
                            <input type="email" id="reg_email" name="email" required>
                            <label for="reg_email">Email</label>
                            <span class="input-line"></span>
                        </div>
                        <span class="error-message" id="reg_emailError"></span>
                    </div>
                    <div class="form-group">
                        <div class="input-wrapper">
                            <input type="password" id="reg_password" name="password" required>
                            <label for="reg_password">Password</label>
                            <button type="button" class="password-toggle" data-target="reg_password">
                                <span class="toggle-icon"></span>
                            </button>
                            <span class="input-line"></span>
                        </div>
                        <span class="error-message" id="reg_passwordError"></span>
                    </div>
                    <div class="form-group">
                        <div class="input-wrapper">
                            <input type="password" id="reg_confirm" name="confirm_password" required>
                            <label for="reg_confirm">Confirm Password</label>
                            <span class="input-line"></span>
                        </div>
                        <span class="error-message" id="reg_confirmError"></span>
                    </div>
                    <button type="submit" class="login-btn" style="background: linear-gradient(135deg, #0099ff, #00ff88);">
                        <span class="btn-text">Create Account</span>
                        <span class="btn-loader"></span>
                        <span class="btn-glow"></span>
                    </button>
                </form>
                <div class="signup-link">
                    <p>Have an account? <a href="javascript:void(0)" id="showLoginBtn">Sign In</a></p>
                </div>
            </div>

            <div id="successMessage" class="success-message" style="display: none;">
                <div class="success-icon">✓</div>
                <h3 id="successTitle">Success!</h3>
                <p id="successText">Redirecting...</p>
            </div>
        </div>
    </div>
    <script src="{% static 'js/script.js' %}"></script>
</body>
</html>
